name: Build & Release POS Terminal

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.1)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  # ── Desktop: Windows, macOS, Linux ─────────────────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
            args: ''
          - platform: macos-latest
            label: macOS (Universal)
            args: '--target universal-apple-darwin'
            extra-rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            label: Linux
            args: ''

    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.extra-rust-targets || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './pos-app/src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install frontend dependencies
        working-directory: pos-app
        run: npm install

      - name: Regenerate icons from source (platform-native ICO/ICNS)
        working-directory: pos-app
        run: npx @tauri-apps/cli icon src-tauri/app-icon.png

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: pos-app
          tagName: ${{ env.TAG_NAME }}
          releaseName: 'GlobiPOS Terminal ${{ env.TAG_NAME }}'
          releaseBody: |
            ## GlobiPOS Terminal ${{ env.TAG_NAME }}

            Download the installer for your platform:

            | Platform | File |
            |----------|------|
            | **Windows** | `.msi` installer or `.exe` portable |
            | **macOS** | `.dmg` (Universal — runs on Intel & Apple Silicon) |
            | **Linux** | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |
            | **Android** | `.apk` (enable "Install from unknown sources") |

            **First-time setup:** Launch the app, enter your server URL and terminal code (e.g. `T001`), then tap Register.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './pos-app/src-tauri -> target'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        working-directory: pos-app
        run: npm install

      - name: Initialize Android project
        working-directory: pos-app
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android init

      - name: Build Android APK
        working-directory: pos-app
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk --split-per-abi

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            pos-app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
